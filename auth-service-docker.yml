server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/auth_db
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: BankingMicroservicesAuthServiceJwtSecretKeyForHS512ChangeInProduction2026
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://naming-server:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
